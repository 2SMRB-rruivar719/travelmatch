services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: travelmatch-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - travelmatch-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: travelmatch-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/travelmatch
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - travelmatch-net
  mongo:
    image: mongo:4.4
    container_name: travelmatch-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: travelmatch
    volumes:
      - mongo_data:/data/db
    networks:
      - travelmatch-net
    
volumes:
  mongo_data:

networks:
  travelmatch-net:
    driver: bridge


